<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
    <!-- Google Fonts for 'Inter' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Main Profile Card Container -->
    <div id="profile-card" class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full mx-auto transform transition-all duration-300 hover:scale-105">
        
        <!-- Profile Header Section -->
        <div class="flex flex-col items-center text-center">
            <div class="relative mb-4">
                <img id="profile-image" class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-cover" src="https://placehold.co/200x200/4F46E5/FFFFFF?text=JP" alt="User Profile Picture">
                <span class="absolute bottom-1 right-1 h-5 w-5 bg-green-500 rounded-full border-2 border-white"></span>
            </div>
            <h1 id="user-name" class="text-3xl font-bold text-gray-800">John Doe</h1>
            <p id="user-username" class="text-sm text-indigo-600 font-medium -mt-1">@johndoe</p>
            <p id="user-bio" class="text-sm text-gray-500 mt-2 italic px-4">Passionate developer and lifelong learner.</p>
        </div>

        <!-- Contact Information and Details -->
        <div class="mt-6 border-t pt-6 text-gray-600">
            <div class="flex items-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span id="user-email" class="font-semibold text-gray-800">johndoe@example.com</span>
            </div>
            <div class="flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2c-4.418 0-8 3.582-8 8s8 14 8 14 8-9.582 8-14-3.582-8-8-8z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span id="user-location" class="font-semibold text-gray-800">San Francisco, CA</span>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="mt-8 flex justify-between space-x-4">
            <button id="edit-profile-btn" class="flex-1 bg-indigo-500 text-white font-bold py-2 px-4 rounded-xl shadow-md hover:bg-indigo-600 transition-colors duration-200">
                Edit Profile
            </button>
            <button id="logout-btn" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-xl shadow-md hover:bg-gray-300 transition-colors duration-200">
                Logout
            </button>
        </div>

    </div>

    <!-- Edit Profile Modal (initially hidden) -->
    <div id="edit-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full transform scale-95 transition-transform duration-300">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Profile</h2>
            <form id="edit-form" class="space-y-4">
                <div>
                    <label for="edit-name" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="edit-name" name="name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                </div>
                <div>
                    <label for="edit-email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="edit-email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                </div>
                <div>
                    <label for="edit-bio" class="block text-sm font-medium text-gray-700">Bio</label>
                    <textarea id="edit-bio" name="bio" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border"></textarea>
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" id="cancel-edit-btn" class="bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-xl shadow-md hover:bg-gray-300 transition-colors duration-200">Cancel</button>
                    <button type="submit" class="bg-indigo-500 text-white font-bold py-2 px-4 rounded-xl shadow-md hover:bg-indigo-600 transition-colors duration-200">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Dummy User Data ---
        // In a real application, this data would come from an API or a database.
        let userProfileData = {
            name: "Jane Doe",
            username: "janedoe",
            email: "jane.doe@example.com",
            bio: "UI/UX designer and coffee enthusiast. Creating beautiful interfaces.",
            location: "New York, NY",
            profileImage: "https://placehold.co/200x200/F9A825/FFFFFF?text=JD"
        };

        // --- DOM Elements ---
        const userNameEl = document.getElementById('user-name');
        const userUsernameEl = document.getElementById('user-username');
        const userEmailEl = document.getElementById('user-email');
        const userBioEl = document.getElementById('user-bio');
        const userLocationEl = document.getElementById('user-location');
        const profileImageEl = document.getElementById('profile-image');

        const editProfileBtn = document.getElementById('edit-profile-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const editNameInput = document.getElementById('edit-name');
        const editEmailInput = document.getElementById('edit-email');
        const editBioInput = document.getElementById('edit-bio');

        // --- Function to Display Profile Data ---
        function displayUserProfile() {
            userNameEl.textContent = userProfileData.name;
            userUsernameEl.textContent = `@${userProfileData.username}`;
            userEmailEl.textContent = userProfileData.email;
            userBioEl.textContent = userProfileData.bio;
            userLocationEl.textContent = userProfileData.location;
            profileImageEl.src = userProfileData.profileImage;
        }

        // --- Event Listeners ---
        
        // Load the profile data when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            displayUserProfile();
        });

        // Show the edit modal when the "Edit Profile" button is clicked
        editProfileBtn.addEventListener('click', () => {
            // Populate the form with current data
            editNameInput.value = userProfileData.name;
            editEmailInput.value = userProfileData.email;
            editBioInput.value = userProfileData.bio;
            
            editModal.classList.remove('hidden');
        });

        // Hide the edit modal when the "Cancel" button is clicked
        cancelEditBtn.addEventListener('click', () => {
            editModal.classList.add('hidden');
        });

        // Handle form submission to save changes
        editForm.addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent the form from submitting normally

            // Update the user data with the new values
            userProfileData.name = editNameInput.value;
            userProfileData.email = editEmailInput.value;
            userProfileData.bio = editBioInput.value;

            // Re-display the updated profile
            displayUserProfile();

            // Hide the modal
            editModal.classList.add('hidden');
        });

        // Log a message for the "Logout" button (no actual functionality in this demo)
        logoutBtn.addEventListener('click', () => {
            console.log("User logged out!");
        });
    </script>

</body>
</html>
